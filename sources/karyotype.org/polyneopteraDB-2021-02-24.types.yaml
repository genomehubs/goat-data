file:
  format: csv
  header: true
  name: polyneopteraDB-2021-02-24.csv
  source: Polyneoptera Karyotype Database
  source_url: https://evobir.shinyapps.io/PolyneopteraDB/
  source_description: A karyotype is a highly variable and complex trait that can reveal changes in genome organization, uncover phylogenetic history, and distinguish cryptic species. The current database contains 823 Polyneoptera karyotypes which we have compiled from 35 publications. Sylvester, Terrence and Heath Blackmon. 2019. Idiosycratic patterns of chromosome evolution are the rule not the exception. Current version of the database is 0.1 last updated 12 August 2019.
  display_group: karyotype
attributes:
  chromosome_number:
    bins:
      min: 0
      max: 10
      count: 10
      scale: log2
    constraint:
      max: 2000
      min: 0
    description: Chromosome number
    display_level: 1
    display_name: Chromosome number
    header: haploidnumber
    separator:
      - ","
      - "-"
    summary:
      - median_high
      - mode
      - max
      - min
    traverse: median_high
    type: short
taxonomy:
  species:
    header: Species
  genus:
    header: Genus
  family:
    header: Family
  order:
    header: Order


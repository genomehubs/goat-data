file:
  format: csv
  header: true
  name: amphib-2021-02-24.csv
  source: Amphibian Karyotype Database
  source_url: https://evobir.shinyapps.io/AmphibianDB/
  source_description: A karyotype is a highly variable and complex trait that can reveal changes in genome organization, uncover phylogenetic history, and distinguish cryptic species. The current database contains 2,124 Amphibian karyotypes which we have compiled from 371 publications. R.D. Perkins, J.R. Gamboa, M.M. Jonika, J. Lo, A. Shum, R.H. Adams, H. Blackmon. The Amphibian Karyotype Database. Chromosome Research. https://doi.org/10.1007/s10577-019-09613-1  Current version of the database is 0.1 last updated 25 June 2019.
  display_group: karyotype
attributes:
  chromosome_number:
    bins:
      min: 0
      max: 10
      count: 10
      scale: log2
    constraint:
      max: 2000
      min: 0
    description: Chromosome number
    display_level: 1
    display_name: Chromosome number
    header: Fundamental.number
    separator:
      - ","
      - "-"
    summary:
      - median_high
      - mode
      - max
      - min
    traverse: median_high
    type: short
taxonomy:
  species:
    header: Species
  family:
    header: Family
  order:
    header: Order


file:
  format: tsv
  header: true
  name: genomesize.tsv
  source: Animal Genome Size Database
  source_url: http://genomesize.com
  display_group: genome_size
attributes:
  c_value:
    bins:
      min: -2.5
      max: 2.5
      count: 10
      scale: log10
    constraint:
      max: 200
      min: 0
    description: 1C value
    display_level: 1
    display_name: C value
    index: 9
    separator:
      - ","
      - "-"
    summary:
      - mean
      - median
      - max
      - min
    traverse: mean
    type: half_float
    units: pgDNA
  c_value_method:
    constraint:
      enum:
        - Biochemical Analysis
        - Bulk Fluorometric Assay
        - Complete Genome Sequencing
        - Feulgen Densitometry
        - Feulgen Image Analysis Densitometry
        - Flow Cytometry
        - Flow karyotyping
        - Fluorescence Fading Analysis
        - Gallocyanin Chrom Alum Densitometry
        - Methyl Green Densitometry
        - Not Specified
        - Static Cell Fluorometry
        - Ultraviolet Microscopy
        - Unknown
    description: C value estimation method
    display_level: 2
    display_name: C value method
    index: 11
    summary: list
    translate:
      BCA: Biochemical Analysis
      BFA: Bulk Fluorometric Assay
      CS: Complete Genome Sequencing
      FD: Feulgen Densitometry
      FIA: Feulgen Image Analysis Densitometry
      FCM: Flow Cytometry
      FK: Flow karyotyping
      FFA: Fluorescence Fading Analysis
      GCD: Gallocyanin Chrom Alum Densitometry
      MGD: Methyl Green Densitometry
      NS: Not Specified
      SCF: Static Cell Fluorometry
      UVM: Ultraviolet Microscopy
      UN: Unknown
    traverse: false
    type: keyword
  c_value_cell_type:
    constraint:
      enum:
        - Antennae
        - Antennal gland
        - Blood cells
        - Brain
        - Buccal epithelium
        - Coelomocytes
        - Corneal epithelium
        - Digestive gland
        - Dorsal fin clip
        - Egg
        - Embyro
        - Epidermis
        - Exopodite
        - Fibroblasts
        - Fin clips
        - Germarium
        - Gills
        - Haemocytes
        - Heart cells
        - Individual chromosomes
        - Intestine
        - Kidney cells
        - Legs
        - Leukocytes
        - Liver
        - Lung (culture)
        - Mantle
        - Midgut
        - Muscle cells
        - NE
        - Not specified
        - Oocytes
        - Ovaries
        - Pancreas
        - Pharynx
        - Polypide cells in suspension
        - Red blood cells
        - Retinal cells
        - Salivary gland
        - Somatic cells
        - Sperm
        - Spleen
        - Tentacles
        - Testes
        - Thymus
        - Tissue Culture
        - Various
        - Ventral hypodermal chord
        - Whole body
        - Whole body squash
    description: Cell type
    display_level: 2
    display_name: C value cell type
    index: 12
    separator:
      - ","
    summary: list
    translate:
      AN: Antennae
      AG: Antennal gland
      BL: Blood cells
      BR: Brain
      BE: Buccal epithelium
      C: Coelomocytes
      CE: Corneal epithelium
      DG: Digestive gland
      FC: Dorsal fin clip
      E: Egg
      EM: Embyro
      EP: Epidermis
      EXP: Exopodite
      FB: Fibroblasts
      FC: Fin clips
      GM: Germarium
      G: Gills
      HE: Haemocytes
      HC: Heart cells
      IC: Individual chromosomes
      INT: Intestine
      KC: Kidney cells
      L: Legs
      LK: Leukocytes
      LV: Liver
      LG: Lung (culture)
      MT: Mantle
      MG: Midgut
      MC: Muscle cells
      Neurons: NE
      NS: Not specified
      OC: Oocytes
      OV: Ovaries
      P: Pancreas
      PH: Pharynx
      PPC: Polypide cells in suspension
      RBC: Red blood cells
      RC: Retinal cells
      SG: Salivary gland
      SC: Somatic cells
      S: Sperm
      SP: Spleen
      TN: Tentacles
      TS: Testes
      TH: Thymus
      TC: Tissue Culture
      V: Various
      VHC: Ventral hypodermal chord
      WB: Whole body
      SQ: Whole body squash
    traverse: false
    type: keyword
  chromosome_number:
    bins:
      min: 0
      max: 10
      count: 10
      scale: log2
    constraint:
      max: 2000
      min: 0
    description: Chromosome number
    display_level: 1
    display_group: karyotype
    display_name: Chromosome number
    index: 10
    function: "{} / 2"
    separator:
      - ","
      - "-"
    summary:
      - median_high
      - mode
      - max
      - min
    traverse: median_high
    type: short
  genome_size:
    bins:
      min: 6
      max: 11
      count: 10
      scale: log10
    constraint:
      min: 0
    description: Genome size
    display_name: Genome size
    display_level: 1
    function: "{} * 978000000"
    index: 9
    separator:
      - ","
      - "-"
    summary:
      - mean
      - median
      - max
      - min
    traverse: mean
    type: long
    units: bases
taxon_names:
  common_name:
    index: 8
taxonomy:
  taxon_id:
    index: 1
  species:
    index: 7
  family:
    index: 6
  order:
    index: 5
  class:
    index: 4
  subphylum:
    index: 3
  phylum:
    index: 2

attributes:
  conservation_list:
    description: List used as source of conservation status information
    display_group: conservation
    display_level: 2
    display_name: Conservation list
    summary: list
    traverse: list
    traverse_direction: down
    type: keyword
    constraint:
      enum:
        - CITES
        - IUCN
        - JNCC
        - REDLIST
  cites_category:
    description: Species CITES status
    long_description: Category of taxon in the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES).
    display_group: conservation
    display_level: 2
    display_name: CITES Category
    summary: list
    traverse: list
    traverse_direction: down
    type: keyword
    constraint:
      enum:
        - appx_I
        - appx_II
        - appx_III
        - conditional
        - NC
    value_metadata:
      appx_I:
        description: "CITES appendix I - globally threatened"
      appx_II:
        description: "CITES appendix II - controlled"
      appx_III:
        description: "CITES appendix III protected in at least one country"
      conditional:
        description: "CITES listed with specific conditions"
      NC:
        description: "Might not be CITES accepted - Check original source"
  redlist_category:
    description: IUCN Red List Category
    long_description: Category of taxon in the latest IUCN Red List assessment.
    display_group: conservation
    display_level: 2
    display_name: RedList Category
    summary: list
    traverse: list
    traverse_direction: down
    type: keyword
    constraint:
      enum:
        - 'nt'
        - 'cr'
        - 'en'
        - 'dd'
        - 'vu'
        - 'lc'
        - 'ex'
        - 'ew'
        - "na"
        - 're'
        - 'lr-nt'
        - 'lr-lc'
        - 'lr-cd'
    value_metadata:
      'nt':
        description: "Near Threatened"
        long_description: "Species is close to qualifying for or is likely to qualify for a threatened category in the near future."
      'cr':
        description: "Critically Endangered"
        long_description: "Species is facing an extremely high risk of extinction in the wild."
      'en':
        description: "Endangered"
        long_description: "Species is facing a very high risk of extinction in the wild."
      'dd':
        description: "Data Deficient"
        long_description: "Insufficient information to make a direct, or indirect, assessment of its risk of extinction based on its distribution and or population status."
      'vu':
        description: "Vulnerable"
        long_description: "Species is considered as facing a high risk of extinction in the wild."
      'lc':
        description: "Least Concern"
        long_description: "Species is evaluated against the Red List criteria, but does not qualify for any category of threat."
      'ex':
        description: "Extinct"
        long_description: "No reasonable doubt that the last individual has died."
      'ew':
        description: "Extinct in the Wild"
        long_description: "Known only to survive in cultivation, in captivity, or as a naturalized population outside its historic range."
      "na":
        description: "Category not applicable."
        long_description: "The category is not applicable to the species."
      're':
        description: "Regionally Extinct"
        long_description: "Species is extinct in a specific region but occurs in its natural range elsewhere."
      'lr-nt':
        description: "Lower Risk-near threatened"
        long_description: "Species is close to qualifying for a threatened category in the near future."
      'lr-lc':
        description: "Lower Risk-least concern"
        long_description: "Species is evaluated but does not qualify for any category of threat."
      'lr-cd':
        description: "Lower Risk-conservation dependent"
        long_description: "Species is the focus of a conservation program, the cessation of which would result in it qualifying for a threatened category within a period of five years."
  redlist_scopes:
    description: IUCN Red List threat status category scope.
    long_description: The region scope under which the threat assessment was made
    display_group: conservation
    display_level: 2
    display_name: RedList Scopes
    summary: list
    traverse: list
    traverse_direction: down
    type: keyword
  redlist_population_trend:
    description: IUCN Red List population trend
    long_description: Population trend of the taxon in the latest IUCN Red List assessment.
    display_group: conservation
    display_level: 2
    display_name: RedList Population Trend
    summary: list
    traverse: list
    traverse_direction: down
    type: keyword

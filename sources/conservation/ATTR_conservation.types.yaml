attributes:
  conservation_list:
    description: List used as source of conservation status information
    display_group: conservation
    display_level: 2
    display_name: Conservation list
    summary: list
    traverse: list
    traverse_direction: down
    type: keyword
    constraint:
      enum:
        - CITES
        - IUCN
        - JNCC
        - REDLIST
  cites_category:
    description: Species CITES status
    long_description: Category of taxon in the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES).
    display_group: conservation
    display_level: 2
    display_name: CITES Category
    summary: list
    traverse: list
    traverse_direction: down
    type: keyword
    constraint:
      enum:
        - appx_I
        - appx_II
        - appx_III
        - conditional
        - NC
    value_metadata:
      appx_I:
        description: "CITES appendix I - globally threatened"
      appx_II:
        description: "CITES appendix II - controlled"
      appx_III:
        description: "CITES appendix III protected in at least one country"
      conditional:
        description: "CITES listed with specific conditions"
      NC:
        description: "Might not be CITES accepted - Check original source"
  redlist_category:
    description: Red List threat status category
    long_description: Category of taxon in the latest Red List assessment.
    display_group: conservation
    display_level: 2
    display_name: RedList Category
    summary: list
    traverse: list
    traverse_direction: down
    type: keyword
    constraint:
      enum:
        - 'Near Threatened'
        - 'Critically Endangered'
        - 'Endangered'
        - 'Data Deficient'
        - 'Vulnerable'
        - 'Least Concern'
        - 'Extinct'
        - 'Extinct in the Wild'
        - 'Not Applicable'
        - 'Regionally Extinct'
        - 'Lower Risk-near threatened'
        - 'Lower Risk-least concern'
        - 'Lower Risk-conservation dependent'
  redlist_scopes:
    description: Red List threat status category scope
    long_description: The region scope under which the threat assessment was made
    display_group: conservation
    display_level: 2
    display_name: RedList Scopes
    summary: list
    traverse: list
    traverse_direction: down
    type: keyword
  redlist_population_trend:
    description: Red List population trend
    long_description: Population trend of the taxon in the latest Red List assessment.
    display_group: conservation
    display_level: 2
    display_name: RedList Population Trend
    summary: list
    traverse: list
    traverse_direction: down
    type: keyword

file:
  format: csv
  header: true
  name: redlist_simple_summary_species.csv
  source: IUCN Red List
  source_date: "2026-07-06"
  source_description: Summary of IUCN Red List of Threatened Species, includes only species rank.
  needs:
    - ATTR_conservation.types.yaml
attributes:
  redlist_category:
    header: redlistCategory
    source_url_stub: https://www.iucnredlist.org/species/
    type: keyword
    translate:
      Near Threatened: NT
      Critically Endangered: CR
      Endangered: EN
      Data Deficient: DD
      Vulnerable: VU
      Least Concern: LC
      Extinct: EX
      Extinct in the Wild: EW
      Not Applicable: 'NA'
      Regionally Extinct: RE
      Lower Risk/near threatened: LR-Nt
      Lower Risk/least concern: LR-Lc
      Lower Risk/conservation dependent: LR-Cd
  redlist_scopes:
    header: scopes
    source_url_stub: https://www.iucnredlist.org/species/
    type: keyword
  redlist_population_trend:
    header: populationTrend
    source_url_stub: https://www.iucnredlist.org/species/
    type: keyword
  conservation_list:
    header: source
    source_url_stub: https://www.iucnredlist.org/species/
    type: keyword
metadata:
  # source_url_stub: "https://www.iucnredlist.org/species/"
  source_slug:
    header: ["internalTaxonId", "assessmentId"]
    join: "/"
taxonomy:
  species:
    header: ["genusName", "speciesName"]
    join: " "
  genus:
    header: genusName
  family:
    header: familyName
  order:
    header: orderName
  class:
    header: className
